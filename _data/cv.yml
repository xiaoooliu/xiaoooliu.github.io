cv:
  name: Xiao Liu
  label: PhD Student in Computer Science and Technology
  email: xiao.liu1223@sjtu.edu.cn
  location: Shanghai, China
  image: ""
  summary: Computer Science PhD student focused on generative AI, diffusion and flow-based models, reinforcement learning, and secure large language models. I am passionate about the mathematical and algorithmic foundations of AI and their applications to scientific discovery and trustworthy AI systems. My research combines generative modeling with predictive signals and RL to solve real-world problems such as protein and antibody design and model security.

