    Experience:
      - company: Shanghai Jiao Tong University
        position: Researcher
        location: Shanghai, China
        start_date: 2025
        end_date: present
        summary: "GABIF: An Adaptive Guided Graph Denoising Framework for Antibody Conditional Inverse Folding. NeurIPS 2026 submission; joint first author, second-listed author."
        highlights:
          - Co-designed a guided discrete diffusion framework for conditional sequence generation and property-aware optimization.
          - Co-led the algorithmic design, experimental protocol, benchmark evaluation, ablation studies, and testing pipeline.
          - Integrated external predictive signals into the generative sampling process to improve downstream target properties.
          - Co-wrote and revised the manuscript with the other joint first author.

      - company: Shanghai Jiao Tong University
        position: Researcher
        location: Shanghai, China
        start_date: 2025
        end_date: present
        summary: "Permutation-based Transformer Model Protection. Ongoing exploratory research on secure and privacy-preserving model architectures."
        highlights:
          - Exploring permutation-equivalence mechanisms to enhance Transformer architecture confidentiality under black-box and white-box attacks.
          - Investigating model transformation strategies that preserve functional behavior while increasing resistance to model extraction.

      - company: Huawei Technologies Co., Ltd.
        position: Engineer, Machine Learning
        location: China
        start_date: 2022-06
        end_date: 2024-10
        highlights:
          - Designed and implemented machine learning algorithms to improve GNSS positioning accuracy under complex terminal scenarios.
          - Led large-scale C software project refactoring to improve code modularity, integrity, maintainability, and system reliability.
          - Provided algorithm optimization and technical support for terminal products including smartphones and smart watches.

      - company: University College London & University of Cambridge
        position: Research Student
        location: London, UK
        start_date: 2020-05
        end_date: 2021-08
        summary: "Signal Processing for Cuff-less Blood Pressure Measurement Using PPG."
        highlights:
          - Proposed a machine learning framework to improve cuff-less blood pressure estimation from PPG signals.
          - Implemented PPG signal prediction and restoration with CNN and LSTM-based models in TensorFlow.
          - Modeled nonlinear relationships between PPG features and blood pressure using deep learning methods.
          - Supervisors: Prof. Andreas Demosthenous and Prof. Dai Jiang.


